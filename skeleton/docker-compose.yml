# docker-compose.yml — YOU WRITE THIS.
# Wire up FIVE services and TWO networks. Discover the required service names and
# ports by reading gateway/nginx.conf (proxy targets) and the app source
# (DB_HOST/REDIS_HOST the services expect).
#
# Requirements:
#   gateway        build ./gateway; publish to your PC (8080:80); frontend-net only
#   tasks-service  build ./tasks-service; DB_* + REDIS_HOST env; on BOTH networks;
#                  start after db is healthy
#   users-service  build ./users-service; same idea, PORT=3000
#   db             official postgres image; POSTGRES_* env; named volume; healthcheck;
#                  backend-net only
#   redis          official redis image; named volume; backend-net only
#
# Remember: the gateway must NOT be able to reach db/redis (network separation).
services:

  gateway:
    build: ./gateway
    ports:
      - "8080:80"
    depends_on:
      - tasks-service
      - users-service
    networks:
      - frontend-net

  tasks-service:
    build: ./tasks-service
    environment:
      - DB_HOST: db
      - DB_NAME: $(DB_NAME)
      - DB_USER: $(DB_USER)
      - DB_PASSWORD: $(DB_PASSWORD)
      - REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend-net
      - backend-net


  users-service:
    build: ./users-service
    environment:
      - DB_HOST: db
      - DB_NAME: $(DB_NAME)
      - DB_USER: $(DB_USER)
      - DB_PASSWORD: $(DB_PASSWORD)
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - frontend-net
      - backend-net

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=$(DB_NAME)
      - POSTGRES_USER=$(DB_USER)
      - POSTGRES_PASSWORD=$(DB_PASSWORD)
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}" ]

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks:
      - backend-net

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
    
volumes:
  db-data:
  redis-data: