# The API GATEWAY. One public door (port 80). It does two kinds of routing:
#   1. Serve the static frontend for "/".
#   2. Route each /api/<thing> path to the microservice that owns it.
# The names "tasks-service" / "users-service" are Compose SERVICE NAMES, which
# Docker's built-in DNS resolves to the right container. No IP addresses, ever.
server {
    listen 80;
    server_name _;

    # ---- Frontend (static files baked into this image) ----
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ---- Route to the tasks microservice ----
    # No trailing slash + no path on proxy_pass => the full URI is forwarded
    # unchanged, so Flask sees "/api/tasks" exactly as written.
    location /api/tasks {
        proxy_pass http://tasks-service:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ---- Route to the users microservice ----
    location /api/users {
        proxy_pass http://users-service:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
